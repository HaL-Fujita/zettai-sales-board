<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZETTAI 営業速報</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0a0a0f;
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 20px;
  }

  /* ── 背景アニメーション ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 40%, rgba(255,60,0,.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 70%, rgba(255,200,0,.10) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── ヘッダー ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
    z-index: 1;
  }
  .header .logo {
    font-size: clamp(13px, 3vw, 16px);
    font-weight: 900;
    letter-spacing: .4em;
    color: #ff4500;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header h1 {
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 900;
    color: #fff;
    letter-spacing: -.02em;
    line-height: 1.1;
  }
  .header h1 span { color: #ffd700; }

  /* ── グリッド ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 820px;
    z-index: 1;
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  }
  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* ── ボタン ── */
  .btn {
    position: relative;
    border: none;
    border-radius: 18px;
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    transition: transform .12s, box-shadow .12s;
    aspect-ratio: 1 / 1.05;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { transform: scale(1.04); }
  .btn:active { transform: scale(.96); }

  .btn-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%; height: 100%;
    padding: 18px 12px;
    border-radius: 18px;
    border: 2px solid rgba(255,255,255,.15);
    transition: border-color .2s;
  }
  .btn:hover .btn-inner { border-color: rgba(255,255,255,.4); }

  /* 色テーマ */
  .c0 .btn-inner { background: linear-gradient(145deg, #1a1a2e, #16213e); box-shadow: 0 0 0 1px #e94560, 0 8px 32px rgba(233,69,96,.3); }
  .c1 .btn-inner { background: linear-gradient(145deg, #1a2a1a, #0d1f0d); box-shadow: 0 0 0 1px #00d26a, 0 8px 32px rgba(0,210,106,.25); }
  .c2 .btn-inner { background: linear-gradient(145deg, #2a1a10, #1f120a); box-shadow: 0 0 0 1px #ff8c00, 0 8px 32px rgba(255,140,0,.3); }
  .c3 .btn-inner { background: linear-gradient(145deg, #1a102a, #140d1f); box-shadow: 0 0 0 1px #9b59b6, 0 8px 32px rgba(155,89,182,.3); }
  .c4 .btn-inner { background: linear-gradient(145deg, #2a1a1a, #1f0d0d); box-shadow: 0 0 0 1px #e74c3c, 0 8px 32px rgba(231,76,60,.3); }
  .c5 .btn-inner { background: linear-gradient(145deg, #0e1f2a, #0a1520); box-shadow: 0 0 0 1px #00bfff, 0 8px 32px rgba(0,191,255,.3); }

  .btn-icon {
    font-size: clamp(28px, 5vw, 40px);
    line-height: 1;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.4));
  }
  .btn-text {
    font-size: clamp(11px, 2vw, 14px);
    font-weight: 900;
    color: #fff;
    text-align: center;
    line-height: 1.35;
    letter-spacing: -.01em;
    word-break: keep-all;
  }

  /* アクティブ光彩 */
  .btn.fired .btn-inner {
    animation: flash .45s ease-out;
  }
  @keyframes flash {
    0%   { filter: brightness(1); }
    30%  { filter: brightness(2.2); }
    100% { filter: brightness(1); }
  }

  /* ── 紙吹雪 ── */
  .confetti {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }
  .piece {
    position: absolute;
    top: -20px;
    width: 10px; height: 14px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(.4); opacity: 0; }
  }

  /* ── 叫び吹き出し ── */
  .shout {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #fff;
    color: #111;
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 900;
    padding: 18px 32px;
    border-radius: 20px;
    text-align: center;
    pointer-events: none;
    z-index: 998;
    box-shadow: 0 12px 60px rgba(0,0,0,.6);
    max-width: 88vw;
    line-height: 1.4;
    animation: none;
  }
  .shout.show {
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1) forwards,
               popOut .4s ease-in 1.8s forwards;
  }
  @keyframes popIn {
    from { transform: translate(-50%,-50%) scale(0) rotate(-4deg); opacity: 0; }
    to   { transform: translate(-50%,-50%) scale(1) rotate(0deg);  opacity: 1; }
  }
  @keyframes popOut {
    from { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    to   { transform: translate(-50%,-50%) scale(.7); opacity: 0; }
  }

  /* ── フッター ── */
  footer {
    margin-top: 28px;
    font-size: 11px;
    color: rgba(255,255,255,.2);
    letter-spacing: .1em;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">株式会社 ZETTAI</div>
  <h1>営業 <span>速報</span> ボード 🔥</h1>
</div>

<div class="grid" id="grid"></div>

<div class="confetti" id="confetti"></div>
<div class="shout" id="shout"></div>

<footer>ZETTAI SALES BOARD — Powered by OpenClaw</footer>

<script>
// ── ボタン定義 ──────────────────────────────
const buttons = [
  {
    icon: '📞',
    label: 'アポ\n取りました！',
    speech: 'アポ取りましたあああ！やったぜ！！！',
    color: 'c0'
  },
  {
    icon: '🤝',
    label: '受注\nいただきました！',
    speech: '受注いただきましたあああ！最高！！！',
    color: 'c1'
  },
  {
    icon: '✍️',
    label: '契約\n取りました！',
    speech: '契約取りましたあああ！よっしゃあ！！！',
    color: 'c2'
  },
  {
    icon: '🌐',
    label: 'HP制作\nいただきました！',
    speech: 'ホームページ制作、いただいちゃいました！ありがとうございます！！！',
    color: 'c3'
  },
  {
    icon: '🚀',
    label: 'OpenClaw\n月額いただきました！',
    speech: 'オープンクローを月額でいただいちゃいました！最高すぎる！！！',
    color: 'c4'
  },
  {
    icon: '⚙️',
    label: 'OpenClaw\n設定代行いただきました！',
    speech: 'オープンクローの設定代行、いただきました！全力でやります！！！',
    color: 'c5'
  }
];

// ── ボタン生成 ──────────────────────────────
const grid = document.getElementById('grid');
buttons.forEach((b, i) => {
  const btn = document.createElement('button');
  btn.className = `btn ${b.color}`;
  btn.innerHTML = `
    <div class="btn-inner">
      <div class="btn-icon">${b.icon}</div>
      <div class="btn-text">${b.label.replace(/\n/g,'<br>')}</div>
    </div>`;
  btn.addEventListener('click', () => fire(btn, b));
  grid.appendChild(btn);
});

// ── メイン処理 ──────────────────────────────
function fire(btn, b) {
  // フラッシュ
  btn.classList.remove('fired');
  void btn.offsetWidth;
  btn.classList.add('fired');
  setTimeout(() => btn.classList.remove('fired'), 500);

  // 吹き出し
  const shout = document.getElementById('shout');
  shout.textContent = b.speech;
  shout.classList.remove('show');
  void shout.offsetWidth;
  shout.classList.add('show');

  // 紙吹雪
  launchConfetti();

  // 音声
  speak(b.speech);
}

// ── 音声（Web Speech API）───────────────────
const synth = window.speechSynthesis;
function speak(text) {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 1.1;    // 少し速め＝元気
  utter.pitch = 1.3;   // 高め＝元気
  utter.volume = 1.0;  // 最大音量

  // 日本語の声を優先
  const voices = synth.getVoices();
  const jpVoice = voices.find(v => v.lang === 'ja-JP' && v.name.includes('Google'))
    || voices.find(v => v.lang === 'ja-JP')
    || voices.find(v => v.lang.startsWith('ja'));
  if (jpVoice) utter.voice = jpVoice;

  synth.speak(utter);
}
// voicesが非同期ロードの場合の対応
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => {};
}

// ── 紙吹雪 ──────────────────────────────────
const COLORS = ['#ff4500','#ffd700','#00d26a','#00bfff','#ff69b4','#fff','#ff8c00','#9b59b6'];
function launchConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'piece';
    const left = Math.random() * 100;
    const dur  = 1.2 + Math.random() * 1.4;
    const delay = Math.random() * 0.5;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const size = 6 + Math.random() * 8;
    p.style.cssText = `
      left: ${left}vw;
      width: ${size}px; height: ${size * 1.4}px;
      background: ${color};
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
    `;
    container.appendChild(p);
  }
  setTimeout(() => container.innerHTML = '', 3000);
}
</script>
</body>
</html>
